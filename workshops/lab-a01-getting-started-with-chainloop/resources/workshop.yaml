apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a01-getting-started-with-chainloop
spec:
  title: Getting Started with Chainloop
  description: >-
    Install the Chainloop CLI, create a workflow and contract, run your first
    attestation manually, and integrate Chainloop attestation into a GitLab CI
    pipeline.
  duration: 75m
  difficulty: intermediate
  publish:
    image: "$(image_repository)/lab-a01-getting-started-with-chainloop-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
      excludePaths:
      - /workshop/demo-app/node_modules/**
      - /workshop/demo-app/.next/**
      - /workshop/demo-app/data/**
  workshop:
    files:
    - image:
        url: "$(image_repository)/lab-a01-getting-started-with-chainloop-files:$(workshop_version)"
    packages:
      - name: chainloop
        files:
          - path: .
            image:
              url: ghcr.io/educates/educates-extension-packages/chainloop:v1.89.8
  session:
    namespaces:
      security:
        token:
          enabled: true  # Required: setup scripts use kubectl to read secrets
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
    objects:
      - apiVersion: gitlab.operators.educates.dev/v1beta1
        kind: GitLabUser
        metadata:
          name: $(session_name)
        spec:
          instanceRef: 
            name: gitlab
            namespace: educates-gitlab-operator
          email: "$(session_name)@chainloop.dev"
          password: "Chainloop123"
          repositories:
          - projectName: chainloop-demo
            projectPath: chainloop-demo
            importUrl: https://gitlab.com/chainloop-dev/integration-demo.git
            visibility: public