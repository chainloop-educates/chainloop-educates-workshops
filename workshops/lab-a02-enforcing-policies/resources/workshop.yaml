apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: lab-a02-enforcing-policies
spec:
  title: Enforcing Policies and Governing Compliance
  description: >-
    Define Rego policies, attach them to a workflow contract, trigger and observe
    policy violations, fix the pipeline to collect a CycloneDX SBOM, and review
    a compliance-ready audit trail.
  duration: 75m
  difficulty: intermediate
  publish:
    image: "$(image_repository)/lab-a02-enforcing-policies-files:$(workshop_version)"
    files:
    - directory:
        path: .
      includePaths:
      - /workshop/**
      - /exercises/**
      - /README.md
      excludePaths:
      - /workshop/demo-app/node_modules/**
      - /workshop/demo-app/.next/**
      - /workshop/demo-app/data/**
  workshop:
    files:
    - image:
        url: "$(image_repository)/lab-a02-enforcing-policies-files:$(workshop_version)"
    packages:
      - name: chainloop
        files:
          - path: .
            image:
              url: $(image_repository)/chainloop:v1.89.8
  session:
    namespaces:
      security:
        token:
          enabled: true  # Required: setup scripts use kubectl to read secrets
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
    objects:
      # GitHub PATs — used by 02-github-env.sh to create and populate the repo
      # admin-pat: needs repo + delete_repo scopes on the chainloop-educates org
      # user-pat:  needs repo scope (used by learners to push commits)
      # For this PoC both can be the same PAT.
      - kind: Secret
        apiVersion: v1
        metadata:
          name: github-pats
        type: Opaque
        stringData:
          admin-pat: "REPLACE_WITH_GITHUB_ADMIN_PAT"
          user-pat: "REPLACE_WITH_GITHUB_USER_PAT"
  environment:
    objects: []
